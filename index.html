<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanBan: Dashboard</title>
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <main>
        <nav>
            <div class="logo">
                <h1>KanBan</h1>
            </div>
            <div class="btn-cont">
                <div class="profile-pic">
                    <img src="https://avatars.githubusercontent.com/u/106401203?s=400&u=774668cafb31bf8c4b3df9755700de11cd093d5a&v=4"
                        alt="#">
                </div>
            </div>
        </nav>
        <div class="board">
            <div id="todo" class="task-container">
                <div class="top">
                    <div class="first">
                        <div>
                            <div class="circle todo-ele"></div>
                            <h3>Todo</h3>
                        </div>
                        <h5 class="tag"><span class="count">0</span> Total</h5>
                    </div>
                    <div class="second">
                        <button class="add-new todo-ele" id="add-new-todo"> <i class="ri-add-line"></i> Add New
                            Task</button>
                    </div>
                </div>
                <div class="btm" id="todo-list">

                </div>
            </div>
            <div id="in-progress" class="task-container">
                <div class="top">
                    <div class="first">
                        <div>
                            <div class="circle inp-ele"></div>
                            <h3>In Progress</h3>
                        </div>
                        <h5 class="tag"><span class="count">0</span> Total</h5>
                    </div>
                    <div class="second">
                        <button class="inp-ele add-new" id="add-new-in-prog"> <i class="ri-add-line"></i> Add New
                            Task</button>
                    </div>
                </div>
                <div class="btm" id="in-progress-list">

                </div>
            </div>
            <div id="completed" class="task-container">
                <div class="top">
                    <div class="first">
                        <div>
                            <div class="circle comp-ele"></div>
                            <h3>Completed</h3>
                        </div>
                        <h5 class="tag"><span class="count">0</span> Total</h5>
                    </div>
                    <div class="second">
                        <button class="comp-ele add-new" id="add-new-comp"><i class="ri-add-line"></i> Add New
                            Task</button>
                    </div>
                </div>
                <div class="btm" id="completed-list">
                </div>
            </div>
            <div class="creat-card">
                <form action="#" id="card-form">
                    <label for="title">title: </label>
                    <input type="text" name="" id="title" placeholder="enter title" required>
                    <label for="description">description: </label>
                    <input type="text" name="" id="description" placeholder="enter description" required>
                    <label for="tag">tag: </label>
                    <input type="text" name="" id="tag" placeholder="enter tag" required>
                    <button type="submit">Create Card</button>
                </form>
            </div>
        </div>
    </main>
    <script src="./js/script.js"></script>
</body>

</html>
