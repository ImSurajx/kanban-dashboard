<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanBan: Dashboard</title>
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <main>
        <nav>
            <div class="logo">
                <h1>KABAN</h1>
            </div>
            <div class="btn-cont">
                <div class="profile-pic">
                    <img src="#" alt="#">
                </div>
                <div class="export"><i class="ri-download-line"></i></div>
                <div class="import"><i class="ri-upload-line"></i></div>
            </div>
        </nav>
        <div class="board">
            <div id="todo" class="task-container">
                <div class="top">
                    <div class="first">
                        <h3>Todo</h3>
                        <h5><span>0</span> Total</h5>
                    </div>
                    <div class="second">
                        <button>Add New Task</button>
                    </div>
                </div>
                <div class="btm" id="todo-list">
                    <div class="card">
                        <div class="tag">Importent</div>
                        <h3>UI/UX Design</h3>
                        <div>
                            <div class="profile"></div>
                            <div class="delete"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="in-progress" class="task-container">
                <div class="top">
                    <div class="first">
                        <h3>Todo</h3>
                        <h5><span>0</span> Total</h5>
                    </div>
                    <div class="second">
                        <button>Add New Task</button>
                    </div>
                </div>
                <div class="btm" id="in-progress-list"></div>
            </div>
            <div id="completed" class="task-container">
                <div class="top">
                    <div class="first">
                        <h3>Todo</h3>
                        <h5><span>0</span> Total</h5>
                    </div>
                    <div class="second">
                        <button>Add New Task</button>
                    </div>
                </div>
                <div class="btm" id="completed-list"></div>
            </div>
        </div>
    </main>
    <script src="./js/script.js"></script>
</body>

</html>
